[widget]
schema_version=1
id=ghost_dp_stats
title=GHOST data statistics
section=ghost_dp_stats.0
binary=/record/GHOST_DP/bin/ghost_dp_widget_stats
description=Live GHOST_DP bitrate, packet health and subscribed field rates
field_shm=false
display_scale=true
geometry_owner=widget
geometry_x=position_x
geometry_y=position_y
