[option.position_y]
type=logical_y
label=Y position
default=20
min=0
max=1079
arg=--y

[option.width]
type=logical_width
label=Width
default=360
min=220
max=800
arg=--w

[option.height]
type=logical_height
label=Height
default=224
min=224
max=224
hidden=true

[option.refresh_hz]
type=integer
label=Refresh rate
default=4
min=1
max=10
