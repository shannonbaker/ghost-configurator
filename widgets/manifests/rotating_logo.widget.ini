[widget]
schema_version=1
id=rotating_logo
title=Rotating G
section=rotating_logo.0
binary=/record/GHOST/gogglesx/bin/ghost_widget_rotating_logo
description=Shallow 3D G logo with a smooth side-to-side swing
field_shm=false
display_scale=true
geometry_owner=widget
geometry_x=position_x
geometry_y=position_y
geometry_width=size
geometry_height=size
geometry_lock_aspect=true
preview=logo
order=40

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=3
min=0
max=1919
arg=--x

[option.position_y]
type=logical_y
label=Y position
default=3
min=0
max=1079
arg=--y

[option.size]
type=logical_size
label=Size
default=64
min=64
max=300
arg=--size

[option.fps]
type=integer
label=Maximum FPS
default=20
min=1
max=60
arg=--fps

[option.swing_degrees]
type=number
label=Swing angle
default=30
min=0
max=45
step=1
arg=--swing-degrees

[option.cycle_seconds]
type=number
label=Cycle seconds
default=2.5
min=0.5
max=20
step=0.1
arg=--cycle-seconds

[option.image]
type=string
label=Image
default=/record/GHOST/gogglesx/assets/ghost-logo-small.png
arg=--image
hidden=true
