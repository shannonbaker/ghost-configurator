[widget]
schema_version=1
id=compass
title=Compass
section=compass.0
binary=/record/GHOST/gogglesx/bin/ghost_widget_compass
description=Heading compass with direction-to-home marker
field_shm=true
display_scale=true
geometry_owner=widget
geometry_x=position_x
geometry_y=position_y
geometry_width=width
geometry_height=height
geometry_lock_aspect=true
preview=circle
order=30

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=1360
min=0
max=1919
arg=--x

[option.position_y]
type=logical_y
label=Y position
default=120
min=0
max=1079
arg=--y

[option.width]
type=logical_width
label=Width
default=320
min=180
max=800
arg=--w

[option.height]
type=logical_height
label=Height
default=320
min=180
max=800
arg=--h

[option.refresh_hz]
type=integer
label=Refresh rate
default=20
min=1
max=60
arg=--hz

[option.test_mode]
type=boolean
label=Test mode
group=Test
default=false
arg=--test-mode

[option.heading_field]
type=field
label=Heading field
default=3
required_hz=20
arg=--heading-field

[option.home_bearing_field]
type=field
label=Home bearing field
default=12
required_hz=4
arg=--home-bearing-field

[option.heading_valid_field]
type=field
label=Heading validity field
default=13
required_hz=2
arg=--heading-valid-field

[option.gps_fix_field]
type=field
label=GPS fix field
default=14
required_hz=2
arg=--gps-fix-field

[option.home_valid_field]
type=field
label=Home validity field
default=15
required_hz=2
arg=--home-valid-field

[option.text_px]
type=integer
label=Text size
default=22
min=8
max=96
arg=--text_px

[option.background_opacity]
type=integer
label=Background opacity
default=120
min=0
max=255
arg=--bg_opacity

[option.smoothing]
type=number
label=Smoothing
default=0
min=0
max=1
step=0.05
arg=--smoothing

[option.stale_ms]
type=integer
label=Field stale timeout (ms)
default=1500
min=100
max=10000
arg=--stale-ms
