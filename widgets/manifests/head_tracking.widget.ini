[widget]
schema_version=1
id=head_tracking
title=Head tracking
section=head_tracking.0
binary=/record/GHOST/gogglesx/bin/ghost_widget_headtrack
description=Two-axis arrow cross that translates for pan and tilt and rotates for roll
field_shm=false
display_scale=false
geometry_owner=manager
geometry_x=position_x
geometry_y=position_y
geometry_width=width
geometry_height=height
geometry_lock_aspect=true
preview=rectangle
order=45

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=70
min=0
max=1919
arg=--x

[option.position_y]
type=logical_y
label=Y position
default=260
min=0
max=1079
arg=--y

[option.width]
type=logical_width
label=Width
default=420
min=180
max=1000
arg=--w

[option.height]
type=logical_height
label=Height
default=420
min=180
max=1000
arg=--h

[option.refresh_hz]
type=integer
label=Refresh rate
default=50
min=1
max=60
arg=--hz

[option.roll_axis]
type=integer
label=Roll source axis (0-2)
default=0
min=0
max=2
arg=--roll-axis

[option.pan_axis]
type=integer
label=Pan source axis (0-2)
default=2
min=0
max=2
arg=--pan-axis

[option.tilt_axis]
type=integer
label=Tilt source axis (0-2)
default=1
min=0
max=2
arg=--tilt-axis

[option.position_scale]
type=number
label=Movement scale
default=1.0
min=0.1
max=5.0
step=0.1
arg=--position-scale

[option.absolute]
type=boolean
label=Use absolute angles
default=false
arg=--absolute

[option.ring_file]
type=string
label=Head-tracking data source
default=/tmp/ghost_gx_tx_ring
arg=--ring-file
hidden=true
