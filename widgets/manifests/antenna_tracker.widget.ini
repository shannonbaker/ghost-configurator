[widget]
schema_version=1
id=antenna_tracker
title=Virtual antenna tracker
section=antenna_tracker.0
binary=/record/GHOST/gogglesx/bin/ghost_widget_antenna_tracker
description=Align two crosshairs to point the goggles at the craft
field_shm=true
display_scale=false
geometry_owner=manager
geometry_x=position_x
geometry_y=position_y
geometry_width=width
geometry_height=height
geometry_lock_aspect=false
preview=rectangle
order=46

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=70
min=0
max=1919
arg=--x

[option.position_y]
type=logical_y
label=Y position
default=260
min=0
max=1079
arg=--y

[option.width]
type=logical_width
label=Width
default=460
min=180
max=1000
arg=--w

[option.height]
type=logical_height
label=Height
default=360
min=180
max=1000
arg=--h

[option.refresh_hz]
type=integer
label=Refresh rate
default=50
min=1
max=60
arg=--hz

[option.latitude_field]
type=field
label=Latitude field
default=4
required_hz=5
arg=--latitude-field

[option.longitude_field]
type=field
label=Longitude field
default=5
required_hz=5
arg=--longitude-field

[option.altitude_field]
type=field
label=GPS altitude field
default=6
required_hz=5
arg=--altitude-field

[option.pan_axis]
type=integer
label=Pan source axis (0-2)
default=2
min=0
max=2
arg=--pan-axis

[option.pan_scale]
type=number
label=Pan scale
default=0.5
min=0.1
max=2.0
step=0.05
arg=--pan-scale

[option.tilt_axis]
type=integer
label=Tilt source axis (0-2)
default=1
min=0
max=2
arg=--tilt-axis

[option.tilt_scale]
type=number
label=Tilt scale
default=0.5
min=0.1
max=2.0
step=0.05
arg=--tilt-scale

[option.reverse_pan]
type=boolean
label=Reverse pan direction
default=false
arg=--reverse-pan

[option.reverse_tilt]
type=boolean
label=Reverse tilt direction
default=false
arg=--reverse-tilt

[option.pan_reference_deg]
type=number
label=Pan reference heading
default=0
min=-180
max=360
step=1
arg=--pan-reference-deg

[option.horizontal_range_deg]
type=number
label=Horizontal angular range
default=90
min=10
max=360
step=5
arg=--horizontal-range-deg

[option.vertical_range_deg]
type=number
label=Vertical angular range
default=60
min=10
max=180
step=5
arg=--vertical-range-deg

[option.smoothing]
type=number
label=Smoothing
default=3
min=0
max=10
step=0.5
arg=--smoothing

[option.expo]
type=number
label=Centre expo
default=3
min=0
max=10
step=0.5
arg=--expo

[option.test_mode]
type=boolean
label=Test mode
default=false
arg=--test-mode

[option.test_distance_m]
type=number
label=Test horizontal distance (m)
default=200
min=0
max=10000
step=1
arg=--test-distance-m

[option.test_altitude_m]
type=number
label=Test altitude above home (m)
default=75
min=-10000
max=10000
step=1
arg=--test-altitude-m

[option.test_bearing_deg]
type=number
label=Test bearing
default=45
min=-180
max=360
step=1
arg=--test-bearing-deg

[option.stale_ms]
type=integer
label=GPS stale timeout (ms)
default=3000
min=0
max=60000
arg=--stale-ms

[option.ring_file]
type=string
label=Head-tracking data source
default=/tmp/ghost_gx_tx_ring
arg=--ring-file
hidden=true
