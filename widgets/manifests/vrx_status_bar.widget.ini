[widget]
schema_version=1
id=vrx_status_bar
title=VRX status bar
section=vrx_status_bar.0
binary=/record/GHOST/gogglesx/bin/ghost_widget_vrx_status_bar
description=Horizontal VTX voltage, VRX voltage, link rate, latency, distance and signal bars
field_shm=false
display_scale=true
geometry_owner=widget
geometry_x=position_x
geometry_y=position_y
geometry_width=width
geometry_height=height
geometry_lock_aspect=true
preview=rectangle
order=30

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=460
min=0
max=1919
arg=--x

[option.position_y]
type=logical_y
label=Y position
default=18
min=0
max=1079
arg=--y

[option.width]
type=logical_width
label=Width
default=1000
min=500
max=1800
arg=--width

[option.height]
type=logical_height
label=Height
default=70
min=40
max=200
arg=--height

[option.refresh_hz]
type=integer
label=Refresh rate
default=4
min=1
max=30
arg=--hz

[option.background_opacity]
type=integer
label=Background opacity
default=150
min=0
max=255
arg=--background-opacity

[option.stale_timeout_ms]
type=integer
label=Voltage stale timeout
default=3000
min=0
max=60000
arg=--stale-ms

[option.status_file]
type=string
label=Voltage status source
default=/tmp/ghost_gx_bb_status
arg=--status-file
hidden=true

[option.info_file]
type=string
label=Link information source
default=/dev/shm/fpv-shm-info
arg=--info-file
hidden=true
