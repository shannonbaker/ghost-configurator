[widget]
schema_version=1
id=pid_scope
title=PID Scope
section=pid_scope.0
binary=/record/GHOST_DP/bin/ghost_dp_widget_pid_scope
description=Rolling single-axis Betaflight setpoint, gyro and PID-term scope
field_shm=true
display_scale=true
geometry_owner=widget
geometry_x=position_x
geometry_y=position_y
geometry_width=width
geometry_height=height
geometry_lock_aspect=false
preview=scope
order=25

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=80
min=0
max=1919

[option.position_y]
type=logical_y
label=Y position
default=620
min=0
max=1079

[option.width]
type=logical_width
label=Width
default=840
min=360
max=1800

[option.height]
type=logical_height
label=Height
default=360
min=220
max=900

[option.max_fps]
type=integer
label=Graph refresh rate
default=50
min=5
max=60

[option.axis]
type=select
label=Axis
default=ROLL
values=ROLL,PITCH,YAW

[option.text_size_px]
type=integer
label=Text size (px)
default=16
min=10
max=36

[option.minimum_data_hz]
type=integer
label=Minimum data rate
default=25
min=5
max=100

[option.data_hz]
type=integer
label=Preferred data rate
default=40
min=5
max=100

[option.rate_range]
type=number
label=Rate graph range (deg/s)
default=1000
min=100
max=4000
step=50

[option.pid_range]
type=number
label=PID graph range
default=500
min=50
max=4000
step=25

[option.background_opacity]
type=integer
label=Background opacity
default=190
min=0
max=255

[option.stale_timeout_ms]
type=integer
label=Field stale timeout (ms)
default=2500
min=2500
max=10000
