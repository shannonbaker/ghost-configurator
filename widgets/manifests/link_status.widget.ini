[widget]
schema_version=1
id=link_status
title=Link status
section=link_status.0
binary=/record/GHOST/gogglesx/bin/ghost_widget_link_status
description=Experimental VRX link rate, latency, MCS, AGC and RF diagnostics
field_shm=false
display_scale=true
geometry_owner=widget
geometry_x=position_x
geometry_y=position_y
geometry_width=width
geometry_height=height
geometry_lock_aspect=true
preview=rectangle
order=35

[option.visible]
type=boolean
label=Enabled
default=false
role=visible

[option.position_x]
type=logical_x
label=X position
default=24
min=0
max=1919
arg=--x

[option.position_y]
type=logical_y
label=Y position
default=80
min=0
max=1079
arg=--y

[option.width]
type=logical_width
label=Width
default=650
min=320
max=1200
arg=--width

[option.height]
type=logical_height
label=Height
default=150
min=100
max=500
arg=--height

[option.refresh_hz]
type=integer
label=Refresh rate
default=4
min=1
max=30
arg=--hz

[option.background_opacity]
type=integer
label=Background opacity
default=160
min=0
max=255
arg=--background-opacity

[option.info_file]
type=string
label=Link information source
default=/dev/shm/fpv-shm-info
arg=--info-file
hidden=true

[option.sky_file]
type=string
label=RF information source
default=/dev/shm/sky_ext_info
arg=--sky-file
hidden=true
